<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Antenna left -->
  <line x1="50" y1="35" x2="25" y2="15" stroke="#35C9B3" stroke-width="7" stroke-linecap="round"/>
  <circle cx="20" cy="11" r="7" fill="#35C9B3"/>
  <!-- Antenna right -->
  <line x1="50" y1="35" x2="75" y2="15" stroke="#35C9B3" stroke-width="7" stroke-linecap="round"/>
  <circle cx="80" cy="11" r="7" fill="#35C9B3"/>
  <!-- TV Body -->
  <rect x="7" y="30" width="86" height="58" rx="12" fill="#35C9B3" transform="rotate(-7 50 60)"/>
  <!-- TV Text -->
  <text x="50" y="73" font-family="Arial, sans-serif" font-weight="900" font-size="44" fill="white" text-anchor="middle" transform="rotate(-7 50 73)">TV</text>
</svg>
